<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Monitor</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #eef2f7; color: #172033; min-height: 100vh; }
      body::before { content: ''; position: fixed; inset: 0; pointer-events: none; background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(22, 163, 74, 0.06) 42%, rgba(217, 119, 6, 0.05)); }
      button { border: 1px solid #b8c3d4; background: #fff; border-radius: 6px; padding: 8px 12px; cursor: pointer; box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06); }
      button:disabled { cursor: not-allowed; opacity: 0.55; }
      button.active { background: #172033; color: #fff; border-color: #172033; }
      .topbar { min-height: 60px; display: flex; align-items: center; gap: 8px; padding: 0 20px; border-bottom: 1px solid #d8dee8; background: rgba(255, 255, 255, 0.94); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 2; box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06); }
      .topbar strong { margin-right: 18px; font-size: 18px; }
      .page { width: min(1480px, calc(100vw - 24px)); margin: 0 auto; padding: 18px 0; position: relative; }
      .toolbar, .summary { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
      .toolbar.compact { margin-top: 10px; margin-bottom: 0; }
      .metric, .panel, .record { background: rgba(255, 255, 255, 0.96); border: 1px solid #d5dce8; border-radius: 8px; padding: 14px; box-shadow: 0 8px 26px rgba(15, 23, 42, 0.07); }
      .metric { min-width: 140px; flex: 1; }
      .metric span, small { color: #667085; display: block; font-size: 12px; }
      .metric strong { font-size: 22px; }
      .panel { margin-bottom: 14px; }
      .statusline { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
      .pill { border: 1px solid #999; border-radius: 99px; padding: 4px 10px; font-weight: 700; }
      .prob { margin: 12px 0; }
      .prob h3, .panel h2 { font-size: 15px; margin-bottom: 8px; }
      .prob label { display: grid; grid-template-columns: 160px 1fr 48px; gap: 8px; align-items: center; margin: 6px 0; }
      .trend { height: 150px; display: flex; gap: 3px; align-items: end; border-left: 1px solid #d8dee8; border-bottom: 1px solid #d8dee8; padding: 8px; }
      .trend span { width: 9px; min-height: 6px; border-radius: 2px 2px 0 0; }
      table { width: 100%; table-layout: fixed; border-collapse: collapse; background: rgba(255, 255, 255, 0.98); border: 1px solid #d8dee8; box-shadow: 0 8px 26px rgba(15, 23, 42, 0.07); }
      th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: 7px 6px; font-size: clamp(9px, 0.72vw, 12px); line-height: 1.25; vertical-align: top; overflow-wrap: anywhere; }
      th { background: #f1f5f9; color: #334155; font-weight: 700; }
      tbody tr:nth-child(even) { background: #f8fafc; }
      tbody tr:hover { background: #eef6ff; }
      .records-table th:nth-child(1), .records-table td:nth-child(1) { width: 10%; }
      .records-table th:nth-child(2), .records-table td:nth-child(2) { width: 7%; }
      .records-table th:nth-child(n+3), .records-table td:nth-child(n+3) { width: 4.6%; }
      .records-table th:nth-child(18), .records-table td:nth-child(18) { width: 7%; }
      .num { font-variant-numeric: tabular-nums; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
      .kv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 12px; }
      .json-input { width: 100%; min-height: 190px; resize: vertical; border: 1px solid #c8d0dc; border-radius: 6px; padding: 12px; font: 13px ui-monospace, SFMono-Regular, Consolas, monospace; color: #172033; background: #fbfcfe; }
      .chart-panel { overflow: hidden; }
      .chart-tooltip { background: #fff; border: 1px solid #c8d0dc; border-radius: 8px; padding: 10px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12); min-width: 220px; }
      .chart-tooltip b { display: block; margin-bottom: 8px; }
      .chart-tooltip .pill { display: inline-block; margin-bottom: 8px; }
      .chart-tooltip p { font-size: 12px; margin: 4px 0; }
      .decrypted { margin-top: 10px; border-top: 1px solid #d8dee8; padding-top: 10px; }
      .decrypted p { margin-bottom: 6px; }
      code, pre { white-space: pre-wrap; word-break: break-word; font-size: 12px; }
      details { margin-top: 10px; }
      summary { cursor: pointer; font-weight: 700; margin-bottom: 8px; }
      .error { color: #b42318; margin-bottom: 12px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
